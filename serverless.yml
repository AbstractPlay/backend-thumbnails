service: abstract-play-backend-thumbnails

frameworkVersion: "3"

custom:
  scheduleEnabled:
    prod: true
    dev: false
  renderBucketName: "thumbnails-prerender-${self:provider.stage}"
  esbuild:
    tsconfig: "./tsconfig.json"
    bundle: true
    sourcemap: true
    format: "esm"
    outExtension:
      ".js": ".mjs"
    platform: "node"
    target: "node20"
    external:
      - "@abstractplay/renderer"
      - "@abstractplay/gameslib"
      - "@sparticuz/chromium"
      - "puppeteer-core"
      - "@aws-sdk/*"
      - "@smithy/*"
      - "sharp"
      - "buffer"
      - "fs"
    exclude:
      - "@sparticuz/chromium"
      - "puppeteer-core"
      - "@abstractplay/renderer"
      - "@abstractplay/gameslib"
      - "sharp"
  scriptable:
    hooks:
      before:package:createDeploymentArtifacts: npm run build:layers

params:
  dev:
    profile: AbstractPlayDev
  prod:
    profile: AbstractPlayProd

plugins:
  - serverless-esbuild
  - serverless-scriptable-plugin

provider:
  name: aws
  runtime: nodejs20.x
  versionFunctions: false
  stage: ${opt:stage, "dev"}
  profile: ${param:profile}
  region: us-east-1
  memorySize: 1024
  logs:
    retentionInDays: 30   # set to any valid retention period (1, 3, 5, 7, 14, 30, 60, 90, 120, 150, 180, 365, 400, 545, 731, 1827, 3653)
  environment:
    SQS_URL: !Ref RenderQueue
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:Query
            - dynamodb:Scan
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
            - dynamodb:ExportTableToPointInTime
            - dynamodb:BatchWriteItem
            - sqs:SendMessage
            - ses:SendEmail
            - ses:SendRawEmail
            - cloudfront:CreateInvalidation
          Resource: "*"
        - Effect: "Allow"
          Action:
            - "s3:ListBucket"
          Resource:
            - "arn:aws:s3:::abstractplay-db-dump"
            - "arn:aws:s3:::records.abstractplay.com"
            - "arn:aws:s3:::${self:custom.renderBucketName}"
        - Effect: "Allow"
          Action:
            - "s3:GetObject"
          Resource:
            - "arn:aws:s3:::abstractplay-db-dump/*"
            - "arn:aws:s3:::${self:custom.renderBucketName}/*"
        - Effect: "Allow"
          Action:
            - "s3:PutObject"
          Resource:
            - "arn:aws:s3:::records.abstractplay.com/*"
            - "arn:aws:s3:::thumbnails.abstractplay.com/*"
            - "arn:aws:s3:::abstractplay-db-dump/*"
            - "arn:aws:s3:::${self:custom.renderBucketName}/*"
        - Effect: "Allow"
          Action:
            - "s3:DeleteObject"
          Resource:
            - "arn:aws:s3:::${self:custom.renderBucketName}/*"

resources:
  Resources:
    RenderQueue:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: abstractplay-render-queue-${self:provider.stage}
        VisibilityTimeout: 900   # match your consumer Lambda timeout
        MessageRetentionPeriod: 86400  # 1 day, adjust as needed

  Outputs:
    RenderQueueArn:
      Value: !GetAtt RenderQueue.Arn
      Export:
        Name: RenderQueueArn-${self:provider.stage}
    RenderQueueUrl:
      Value: !Ref RenderQueue
      Export:
        Name: RenderQueueUrl-${self:provider.stage}

functions:
  thumbnails:
    handler: src/functions/thumbnails.handler
    description: Generates random thumbnails daily
    timeout: 300
    memorySize: 5120
    logRetentionInDays: 7
    environment:
      RENDER_BUCKET: ${self:custom.renderBucketName}
    layers:
      - arn:aws:lambda:us-east-1:153672715141:layer:sharp:1 # Replace with your actual sharp layer ARN if different
    events:
      - eventBridge:
          name: abstractplay-${self:provider.stage}-thumbnails
          description: Generates random thumbnails daily
          enabled: ${self:custom.scheduleEnabled.${self:provider.stage}}
          # 6am UTC daily (giving record generation plenty of time to complete)
          schedule: cron(0 6 * * ? *)

  s3-to-sqs:
    handler: src/functions/s3-to-sqs.handler
    description: Triggered when new objects are written to S3, pushes job info to SQS
    timeout: 30
    memorySize: 512
    logRetentionInDays: 7
    environment:
      TARGET_QUEUE_ARN: !GetAtt RenderQueue.Arn
      RENDER_BUCKET: ${self:custom.renderBucketName}
    events:
      - s3:
          bucket: ${self:custom.renderBucketName}
          existing: true
          event: s3:ObjectCreated:*

  sqs-to-render:
    handler: src/functions/sqs-to-render.handler
    description: Consumes SQS messages, renders SVG, writes to output bucket, deletes original
    timeout: 300
    memorySize: 2048
    logRetentionInDays: 7
    environment:
      RENDER_BUCKET: ${self:custom.renderBucketName}
    layers:
      - !Ref AbstractplayRendererLambdaLayer
    events:
      - sqs:
          arn:
            Fn::GetAtt:
              - RenderQueue
              - Arn

package:
  patterns:
    - fonts/**

layers:
  # abstractplayGameslib:
  #   path: .serverless/layers/abstractplay-gameslib
  #   name: abstractplay-gameslib-${sls:stage}
  #   description: "Layer for @abstractplay/gameslib"
  #   compatibleRuntimes:
  #     - nodejs20.x
  #   retain: false
  abstractplayRenderer:
    path: .serverless/layers/abstractplay-renderer
    name: abstractplay-renderer-${sls:stage}
    description: "Layer for @abstractplay/renderer and its dependencies (puppeteer)"
    compatibleRuntimes:
      - nodejs20.x
    retain: false
